<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF Search</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0f0f0f;
    color: #e8e8e6;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  #header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 20px;
    border-bottom: 0.5px solid #2a2a28;
    flex-shrink: 0;
  }

  #folder-btn {
    display: flex;
    align-items: center;
    gap: 7px;
    background: #1e1e1c;
    border: 0.5px solid #3a3a38;
    border-radius: 8px;
    color: #b0b0ae;
    font-size: 13px;
    padding: 7px 12px;
    cursor: pointer;
    white-space: nowrap;
    flex-shrink: 0;
    transition: border-color 0.15s, color 0.15s;
  }
  #folder-btn:hover { border-color: #5a5a58; color: #e8e8e6; }
  #folder-btn svg { flex-shrink: 0; }

  #folder-path {
    font-size: 13px;
    color: #5a5a58;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    flex: 1;
  }
  #folder-path.active { color: #7a7a78; }

  #stats {
    font-size: 12px;
    color: #4a4a48;
    white-space: nowrap;
    flex-shrink: 0;
  }

  #search-bar {
    padding: 14px 20px;
    border-bottom: 0.5px solid #1e1e1c;
    flex-shrink: 0;
  }

  #search-input {
    width: 100%;
    background: #1a1a18;
    border: 0.5px solid #2e2e2c;
    border-radius: 8px;
    color: #e8e8e6;
    font-size: 16px;
    padding: 10px 14px;
    outline: none;
    transition: border-color 0.15s;
  }
  #search-input:focus { border-color: #505050; }
  #search-input::placeholder { color: #3a3a38; }
  #search-input:disabled { opacity: 0.4; }

  #results {
    flex: 1;
    overflow-y: auto;
    padding: 8px 12px;
  }
  #results::-webkit-scrollbar { width: 6px; }
  #results::-webkit-scrollbar-track { background: transparent; }
  #results::-webkit-scrollbar-thumb { background: #2a2a28; border-radius: 3px; }

  .result-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 9px 10px;
    border-radius: 7px;
    cursor: pointer;
    transition: background 0.1s;
  }
  .result-item:hover { background: #1a1a18; }
  .result-item:active { background: #222220; }

  .pdf-icon {
    flex-shrink: 0;
    width: 28px;
    height: 28px;
    background: #2a1a1a;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 9px;
    font-weight: 600;
    color: #c0504a;
    letter-spacing: 0.02em;
  }

  .result-info { flex: 1; min-width: 0; }

  .result-name {
    font-size: 14px;
    color: #d8d8d6;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    line-height: 1.4;
  }
  .result-name mark {
    background: #3a3010;
    color: #e8c840;
    border-radius: 2px;
    padding: 0 1px;
  }

  .result-path {
    font-size: 11px;
    color: #3e3e3c;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-top: 1px;
  }

  .result-size {
    font-size: 11px;
    color: #3a3a38;
    white-space: nowrap;
    flex-shrink: 0;
  }

  #empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 10px;
    color: #3a3a38;
    text-align: center;
    padding: 40px;
  }
  #empty-state .icon { font-size: 40px; margin-bottom: 4px; }
  #empty-state .title { font-size: 15px; color: #4a4a48; }
  #empty-state .sub { font-size: 13px; line-height: 1.6; max-width: 280px; }

  #indexing-bar {
    padding: 12px 20px;
    border-top: 0.5px solid #1e1e1c;
    font-size: 12px;
    color: #5a5a58;
    flex-shrink: 0;
    display: none;
  }
  #indexing-bar.visible { display: block; }
  #indexing-progress {
    height: 2px;
    background: #1e1e1c;
    border-radius: 1px;
    margin-top: 6px;
    overflow: hidden;
  }
  #indexing-fill {
    height: 100%;
    background: #505050;
    border-radius: 1px;
    transition: width 0.2s;
    width: 0%;
  }

  .separator {
    height: 0.5px;
    background: #1a1a18;
    margin: 4px 0;
  }

  #result-count {
    font-size: 11px;
    color: #3a3a38;
    padding: 6px 10px 2px;
  }
  #result-count .timing {
    color: #4a6a4a;
    font-variant-numeric: tabular-nums;
  }
</style>
</head>
<body>

<div id="header">
  <button id="folder-btn" onclick="pickFolder()">
    <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
      <path d="M1 3.5A1.5 1.5 0 012.5 2h3.086a1.5 1.5 0 011.06.44l.915.914A1.5 1.5 0 008.62 4H13.5A1.5 1.5 0 0115 5.5v7A1.5 1.5 0 0113.5 14h-11A1.5 1.5 0 011 12.5v-9z" stroke="currentColor" stroke-width="1.2"/>
    </svg>
    Choose folder
  </button>
  <div id="folder-path">No folder selected</div>
  <div id="stats"></div>
  <input type="file" id="dir-input" webkitdirectory directory multiple style="display:none">
</div>

<div id="search-bar">
  <input type="text" id="search-input" placeholder="Search PDFs…" disabled autocomplete="off" spellcheck="false" oninput="onSearch()">
</div>

<div id="results">
  <div id="empty-state">
    <div class="icon">
      <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
        <rect x="8" y="4" width="28" height="36" rx="3" stroke="#2a2a28" stroke-width="2"/>
        <path d="M28 4v9h9" stroke="#2a2a28" stroke-width="2" stroke-linejoin="round"/>
        <circle cx="36" cy="36" r="8" stroke="#3a3a38" stroke-width="2"/>
        <path d="M42 42l-3-3" stroke="#3a3a38" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="title" id="empty-title">Choose a folder to start</div>
    <div class="sub" id="empty-sub">Pick any folder and all PDF files will be indexed instantly for fast searching.</div>
  </div>
</div>

<div id="indexing-bar">
  <span id="indexing-label">Indexing…</span>
  <div id="indexing-progress"><div id="indexing-fill"></div></div>
</div>

<script>
let allFiles = [];
let directoryHandle = null;
let searchTimeout = null;

async function pickFolder() {
  if (window.showDirectoryPicker) {
    try {
      const handle = await window.showDirectoryPicker({ mode: 'read' });
      directoryHandle = handle;
      document.getElementById('folder-path').textContent = handle.name;
      document.getElementById('folder-path').classList.add('active');
      await indexFolder(handle);
      return;
    } catch (e) {
      if (e.name === 'AbortError') return;
      console.error(e);
    }
  }
  document.getElementById('dir-input').click();
}

document.getElementById('dir-input').addEventListener('change', function(e) {
  const files = Array.from(e.target.files || []);
  if (!files.length) return;
  indexFromInput(files);
  e.target.value = '';
});

function indexFromInput(files) {
  directoryHandle = null;
  allFiles = [];

  const pdfs = files.filter(f => f.name.toLowerCase().endsWith('.pdf'));
  let rootName = '';
  if (files[0] && files[0].webkitRelativePath) {
    rootName = files[0].webkitRelativePath.split('/')[0];
  }
  document.getElementById('folder-path').textContent = rootName || 'Selected folder';
  document.getElementById('folder-path').classList.add('active');

  for (const f of pdfs) {
    const rel = f.webkitRelativePath || f.name;
    const parts = rel.split('/');
    parts.shift();
    const path = parts.slice(0, -1).join('/');
    const dispPath = path ? path + '/' : '';
    allFiles.push({ name: f.name, path: dispPath, fullPath: dispPath + f.name, file: f, size: f.size });
  }

  document.getElementById('indexing-bar').classList.remove('visible');
  document.getElementById('search-input').disabled = false;
  document.getElementById('search-input').focus();

  const s = allFiles.length;
  document.getElementById('stats').textContent = s + ' PDF' + (s !== 1 ? 's' : '');
  if (s === 0) {
    showEmpty('No PDFs found', 'This folder doesn\'t contain any PDF files. Try a different folder.');
  } else {
    renderResults(allFiles.slice(0, 200));
  }
}

async function indexFolder(handle) {
  allFiles = [];
  const bar = document.getElementById('indexing-bar');
  const label = document.getElementById('indexing-label');
  const fill = document.getElementById('indexing-fill');
  bar.classList.add('visible');
  label.textContent = 'Scanning…';
  fill.style.width = '0%';

  document.getElementById('search-input').disabled = true;
  document.getElementById('stats').textContent = '';
  showEmpty('Indexing files…', 'This only takes a moment.');

  const found = [];
  await walk(handle, '', found, handle.name);

  allFiles = found;
  bar.classList.remove('visible');
  document.getElementById('search-input').disabled = false;
  document.getElementById('search-input').focus();

  const s = allFiles.length;
  document.getElementById('stats').textContent = s + ' PDF' + (s !== 1 ? 's' : '');

  if (s === 0) {
    showEmpty('No PDFs found', 'This folder doesn\'t contain any PDF files. Try a different folder.');
  } else {
    renderResults(allFiles.slice(0, 200));
  }
}

async function walk(handle, relPath, found, rootName) {
  const fill = document.getElementById('indexing-fill');
  const label = document.getElementById('indexing-label');
  try {
    for await (const [name, entry] of handle.entries()) {
      if (entry.kind === 'directory') {
        await walk(entry, relPath + name + '/', found, rootName);
      } else if (name.toLowerCase().endsWith('.pdf')) {
        let size = 0;
        try { const f = await entry.getFile(); size = f.size; } catch(e) {}
        found.push({ name, path: relPath, fullPath: relPath + name, handle: entry, size });
        if (found.length % 50 === 0) {
          label.textContent = 'Found ' + found.length + ' PDFs…';
          const pct = Math.min(90, found.length / 5);
          fill.style.width = pct + '%';
          await new Promise(r => setTimeout(r, 0));
        }
      }
    }
  } catch(e) {}
  fill.style.width = '100%';
}

function showEmpty(title, sub) {
  const r = document.getElementById('results');
  r.innerHTML = '<div id="empty-state"><div class="icon"><svg width="48" height="48" viewBox="0 0 48 48" fill="none"><rect x="8" y="4" width="28" height="36" rx="3" stroke="#2a2a28" stroke-width="2"/><path d="M28 4v9h9" stroke="#2a2a28" stroke-width="2" stroke-linejoin="round"/><circle cx="36" cy="36" r="8" stroke="#3a3a38" stroke-width="2"/><path d="M42 42l-3-3" stroke="#3a3a38" stroke-width="2" stroke-linecap="round"/></svg></div><div class="title">' + title + '</div><div class="sub">' + sub + '</div></div>';
}

function onSearch() {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(doSearch, 60);
}

function doSearch() {
  const q = document.getElementById('search-input').value.trim().toLowerCase();
  if (!allFiles.length) return;

  if (!q) {
    renderResults(allFiles.slice(0, 200));
    return;
  }

  const terms = q.split(/\s+/).filter(Boolean);
  const matches = [];

  const t0 = performance.now();          // start the stopwatch
  for (const f of allFiles) {
    const haystack = f.fullPath.toLowerCase();
    if (terms.every(t => haystack.includes(t))) {
      matches.push(f);
    }
  }
  const elapsed = performance.now() - t0; // how long the scan took, in ms

  renderResults(matches, terms, q, elapsed);
}

function highlight(text, terms) {
  if (!terms || !terms.length) return escHtml(text);
  let result = escHtml(text);
  for (const t of terms) {
    const re = new RegExp('(' + escRe(escHtml(t)) + ')', 'gi');
    result = result.replace(re, '<mark>$1</mark>');
  }
  return result;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function escRe(s) {
  return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

function fmtSize(bytes) {
  if (bytes === 0) return '';
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1048576) return Math.round(bytes/1024) + ' KB';
  return (bytes/1048576).toFixed(1) + ' MB';
}

function fmtTime(ms) {
  if (ms < 1) return ms.toFixed(3) + ' ms';   // sub-millisecond: show 3 decimals
  if (ms < 10) return ms.toFixed(2) + ' ms';
  return Math.round(ms) + ' ms';
}

function renderResults(files, terms, query, elapsed) {
  const r = document.getElementById('results');
  if (!files.length) {
    showEmpty('No results', query ? 'Nothing matches "' + escHtml(query) + '".' : 'No PDFs found.');
    return;
  }

  const shown = files.slice(0, 500);
  let html = '';

  if (shown.length > 0) {
    const countText = terms
      ? shown.length + (files.length > 500 ? '+' : '') + ' result' + (shown.length !== 1 ? 's' : '')
      : shown.length + (files.length > 500 ? '+' : '') + ' of ' + allFiles.length + ' PDF' + (allFiles.length !== 1 ? 's' : '');
    const timeText = (elapsed != null)
      ? ' · scanned ' + allFiles.length.toLocaleString() + ' in ' + fmtTime(elapsed)
      : '';
    html += '<div id="result-count">' + countText + '<span class="timing">' + timeText + '</span></div>';
  }

  for (const f of shown) {
    const nameHtml = highlight(f.name, terms);
    const pathHtml = f.path ? highlight(f.path, terms) : '';
    const size = fmtSize(f.size);
    html += '<div class="result-item" onclick="openFile(this)" data-path="' + escHtml(f.fullPath) + '">' +
      '<div class="pdf-icon">PDF</div>' +
      '<div class="result-info">' +
        '<div class="result-name">' + nameHtml + '</div>' +
        (f.path ? '<div class="result-path">' + pathHtml + '</div>' : '') +
      '</div>' +
      (size ? '<div class="result-size">' + size + '</div>' : '') +
    '</div>';
  }

  r.innerHTML = html;
}

async function openFile(el) {
  const fullPath = el.getAttribute('data-path');
  const parts = fullPath.split('/');
  const fileName = parts[parts.length - 1];
  const dirs = parts.slice(0, -1);

  const rec = allFiles.find(f => f.fullPath === fullPath);
  if (rec && rec.file) {
    const url = URL.createObjectURL(rec.file);
    window.open(url, '_blank');
    setTimeout(() => URL.revokeObjectURL(url), 10000);
    return;
  }

  try {
    let handle = directoryHandle;
    for (const dir of dirs) {
      if (dir) handle = await handle.getDirectoryHandle(dir);
    }
    const fileHandle = await handle.getFileHandle(fileName);
    const file = await fileHandle.getFile();
    const url = URL.createObjectURL(file);
    window.open(url, '_blank');
    setTimeout(() => URL.revokeObjectURL(url), 10000);
  } catch(e) {
    alert('Could not open file: ' + fileName);
  }
}

document.getElementById('search-input').addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    this.value = '';
    doSearch();
  }
});
</script>
</body>
</html>
